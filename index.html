<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lebaran Bersama Fuya 🌙</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --hijau-tua: #064e3b;
            --emas: #fbbf24;
            --putih: #fef3c7;
        }

        body {
            background: radial-gradient(circle, #065f46 0%, #022c22 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            color: var(--putih);
        }

        /* --- Dekorasi --- */
        .ketupat { position: absolute; top: -10px; font-size: 3rem; animation: swing 3s ease-in-out infinite; z-index: 5; }
        .k-kiri { left: 10%; }
        .k-kanan { right: 10%; animation-delay: 1s; }
        @keyframes swing { 0%, 100% { transform: rotate(-15deg); } 50% { transform: rotate(15deg); } }
        
        .bedug-container { font-size: 4rem; margin-bottom: 10px; animation: beat 0.8s infinite alternate; display: inline-block; }
        @keyframes beat { to { transform: scale(1.1); filter: drop-shadow(0 0 10px var(--emas)); } }

        /* --- Kartu --- */
        .card { background: rgba(6, 95, 70, 0.95); border: 2px solid var(--emas); border-radius: 25px; padding: 30px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.6); width: 85%; max-width: 400px; position: relative; z-index: 10; }
        #timer { position: absolute; top: 20px; font-size: 0.8rem; background: rgba(0,0,0,0.3); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--emas); }

        input[type="text"] { width: 80%; padding: 12px; margin: 15px 0; border-radius: 10px; border: 1px solid var(--emas); background: rgba(255,255,255,0.1); color: white; text-align: center; outline: none; }
        .btn-buka { background: var(--emas); color: var(--hijau-tua); border: none; padding: 12px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-buka:hover { transform: scale(1.05); }

        .teks-arab { font-size: 1.8rem; color: var(--emas); margin: 15px 0; }
        .watermark { position: absolute; bottom: 15px; right: 20px; font-size: 0.7rem; opacity: 0.5; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="ketupat k-kiri">🎋</div>
    <div class="ketupat k-kanan">🎋</div>
    <div id="timer">Memuat waktu...</div>

    <div class="card">
        <div id="inputSection">
            <div class="bedug-container">🥁</div>
            <h2 style="color: var(--emas);">Halo!</h2>
            <p>Masukkan namamu dulu ya:</p>
            <input type="text" id="namaInput" placeholder="Ketik nama di sini..." autocomplete="off">
            <br>
            <button class="btn-buka" onclick="mulaiKejutan()">Buka Pesan ✨</button>
        </div>

        <div id="pesanSection" class="hidden">
            <h3 style="color: var(--emas);">Untuk <span id="displayNama"></span>,</h3>
            <div class="teks-arab">تَقَبَّلَ اللَّهُ مِنَّا وَمِنْكُمْ</div>
            <p><strong>Taqabbalallahu Minna wa Minkum</strong></p>
            <p>Semoga Allah menerima amal ibadah kita semua. Selamat Hari Raya Idul Fitri 1447 H!</p>
        </div>
    </div>

    <div class="watermark">by.fuya</div>

    <script>
        function updateTime() {
            const sekarang = new Date();
            document.getElementById('timer').innerHTML = `${sekarang.toLocaleDateString('id-ID')} | ${sekarang.toLocaleTimeString('id-ID')}`;
        }
        setInterval(updateTime, 1000);
        updateTime();

        function mulaiKejutan() {
            const nama = document.getElementById('namaInput').value;
            if (nama.trim() === "") { alert("Namanya diisi dulu ya!"); return; }
            document.getElementById('displayNama').innerText = nama;
            document.getElementById('inputSection').style.display = 'none';
            document.getElementById('pesanSection').classList.remove('hidden');
            confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
        }
    </script>
</body>
</html>
